<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes | Local Eats</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <header class="glass-header">
        <div class="container header-container">
            <h1 class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Local<span class="accent">Eats</span></a></h1>
            <nav>
                <a href="index.html">Explorar</a>
                <a href="profile.html">Meus Favoritos</a>
            </nav>
            <div class="user-mock" id="userBadge">
                <i class="ri-user-smile-line"></i> Visitante
            </div>
        </div>
    </header>

    <main class="container details-container">
        <div id="loadingDetail" class="loading">Carregando detalhes do restaurante...</div>
        
        <div id="restaurantContent" class="hidden">
            <div class="detail-header">
                <img id="restImage" src="" alt="Restaurant Image" class="detail-hero-img">
                <!-- SMELL DE ACESSIBILIDADE E UX: esse botão flutua em cima do texto no mobile intencionalmente -->
                <button id="favBtn" class="fav-btn-float"><i class="ri-heart-line"></i> Favoritar</button>
            </div>
            
            <div class="detail-info">
                <div class="title-row">
                    <h2 id="restName">Nome do Restaurante</h2>
                    <span id="restPrice" class="price-badge">$$$</span>
                </div>
                
                <p class="meta-tags">
                    <span id="restCuisine"><i class="ri-restaurant-2-line"></i> Culinária</span>
                    <span id="restLocation"><i class="ri-map-pin-line"></i> Localização</span>
                </p>
                
                <p id="restDesc" class="description">Descrição deliciosa do lugar e sua história incrível.</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-target="menuSec">Cardápio</button>
                <button class="tab-btn" data-target="reviewSec">Avaliações</button>
            </div>

            <div id="menuSec" class="tab-content active">
                <h3>Nosso Cardápio</h3>
                <div id="menuList" class="menu-list">
                    <!-- Gerado pelo JS -->
                </div>
            </div>

            <div id="reviewSec" class="tab-content">
                <h3>O que dizem sobre nós</h3>
                <div id="reviewList" class="review-list">
                    <!-- Gerado pelo JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
