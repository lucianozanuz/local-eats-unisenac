<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos | Local Eats</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <header class="glass-header">
        <div class="container header-container">
            <a href="index.html" class="logo">Local<span class="accent">Eats</span></a>
            <nav>
                <a href="index.html">Explorar</a>
                <a href="profile.html">Meus Favoritos</a>
                <a href="orders.html" class="active">Meus Pedidos</a>
            </nav>
            <div class="user-mock" id="userBadge">
                <i class="ri-loader-4-line ri-spin"></i>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="profile-header" style="padding-bottom:20px; border-bottom: none">
            <h2 class="section-title">Histórico de Transações</h2>
        </div>
        
        <div class="orders-grid" id="ordersList">
            <div class="loading">Carregando seus pedidos...</div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const orders = await API.getOrders();
                const container = document.getElementById('ordersList');
                
                if (!orders || orders.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding: 50px; color: var(--text-muted); width: 100%; grid-column: 1 / -1;">
                        <i class="ri-file-list-3-line" style="font-size: 48px;"></i>
                        <p style="margin-top:20px;">Você ainda não fez nenhum pedido.</p>
                    </div>`;
                    return;
                }

                let html = '';
                // Como não guardamos nome do restaurante no getOrders simples sem join avançado, mostramos info
                orders.forEach(o => {
                    let itemsHtml = (o.items || []).map(i => `
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:14px; color:var(--text-muted)">
                            <span>${i.quantity}x Item Id #${i.menu_id}</span>
                            <span>R$ ${(i.price_at_time * i.quantity).toFixed(2)}</span>
                        </div>
                    `).join('');

                    html += `
                        <div class="order-card">
                            <div class="order-body" style="height:auto;">
                                <div class="order-title">
                                    Pedido #${o.id}
                                    <span class="status-badge">${o.status}</span>
                                </div>
                                <div style="margin-bottom: 20px;">
                                    <p style="color:var(--text-muted); font-size:14px;">Restaurante ID: ${o.restaurant_id}</p>
                                </div>
                                <div style="flex-grow:1; margin-bottom:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">
                                    ${itemsHtml}
                                </div>
                                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px">
                                    <span>Total Estimado:</span>
                                    <span style="color:var(--primary-color)">R$ ${o.total_amount.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                document.getElementById('ordersList').innerHTML = `<div class="error-msg" style="display:block">Erro ao carregar pedidos. Faça login novamente.</div>`;
            }
        });
    </script>
</body>
</html>
